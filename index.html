// ── PWA meta (fixed btoa with unicode-safe encoding) ────────────────────────
function InjectPWAMeta() {
  useEffect(() => {
    const setMeta = (name, content) => {
      let el = document.querySelector(`meta[name="${name}"]`);
      if (!el) { el = document.createElement("meta"); el.setAttribute("name", name); document.head.appendChild(el); }
      el.setAttribute("content", content);
    };
    const setLink = (rel, href, extra = {}) => {
      let el = document.querySelector(`link[rel="${rel}"]`);
      if (!el) { el = document.createElement("link"); el.setAttribute("rel", rel); document.head.appendChild(el); }
      el.setAttribute("href", href);
      Object.entries(extra).forEach(([k, v]) => el.setAttribute(k, v));
    };
    document.title = "Mis Finanzas";
    setMeta("apple-mobile-web-app-capable", "yes");
    setMeta("apple-mobile-web-app-status-bar-style", "black-translucent");
    setMeta("apple-mobile-web-app-title", "Finanzas");
    setMeta("mobile-web-app-capable", "yes");
    setMeta("theme-color", "#0a0f1e");
    setMeta("viewport", "width=device-width, initial-scale=1, viewport-fit=cover");

    // SVG icon WITHOUT emoji (avoids btoa unicode errors). Diamond shape drawn as polygon.
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><rect width="180" height="180" rx="40" fill="url(#g)"/><polygon points="90,55 130,95 90,135 50,95" fill="white" opacity="0.95"/><polygon points="90,55 110,75 90,95 70,75" fill="white" opacity="0.6"/></svg>`;
    const iconUrl = "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    setLink("apple-touch-icon", iconUrl);
    setLink("icon", iconUrl, { type: "image/svg+xml" });
  }, []);
  return null;
}

// ── Persistence hook ────────────────────────────────────────────────────────
function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const setPersisted = useCallback((value) => {
    setState(prev => {
      const next = typeof value === "function" ? value(prev) : value;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [state, setPersisted];
}

// ── Mini chart ───────────────────────────────────────────────────────────────
function DonutChart({ data, total, size = 120 }) {
  const cx=size/2, cy=size/2, r=size*0.38, sw=size*0.13;
  let cum=0;
  return (
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth={sw}/>
      {data.map(({ value, color }, idx) => {
        const pct = total > 0 ? value / total : 0;
        if (pct === 0) return null;
        const a0 = cum * 2 * Math.PI - Math.PI/2;
        cum += pct;
        const a1 = cum * 2 * Math.PI - Math.PI/2;
        const lg = pct > 0.5 ? 1 : 0;
        const d = `M${cx+r*Math.cos(a0)} ${cy+r*Math.sin(a0)} A${r} ${r} 0 ${lg} 1 ${cx+r*Math.cos(a1)} ${cy+r*Math.sin(a1)}`;
        return <path key={idx} d={d} fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"/>;
      })}
    </svg>
  );
}

      </div>
    </div>
  );
}

        .navBtn:disabled{opacity:.3;}
      `}</style>

              </div>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
                <span style={{ fontSize:12,color:"#475569" }}>Pagado {pct}%</span>
                {diff!==null && <span className="pill" style={{ background:diff<30?"#EF444422":"#1e293b",color:diff<30?"#EF4444":"#64748b" }}>
                  {diff<0?"Vencida":diff<30?`${diff}d restantes`:due.toLocaleDateString("es-AR",{day:"numeric",month:"short"})}
                </span>}
              </div>
              <button className="btnInc" style={{ padding:"8px", fontSize:13 }} onClick={()=>{setFPay({debtId:d.id,amount:""});setModal("payDebt");}}>+ Registrar pago</button>
            </div>;
          })}
          {debts.length===0&&<div style={{ textAlign:"center",padding:40,color:"#475569" }}><p>¡Sin deudas registradas!</p></div>}
          <button className="btn" style={{ marginTop:8 }} onClick={()=>{setEditing(null);setFDebt({name:"",total:"",paid:"",dueDate:""});setModal("debt");}}>+ Nueva deuda</button>
        </div>}

        {/* ════ MORE (settings + budgets + backup) ════ */}
        {tab==="more" && <div style={{ padding:"12px 16px 16px" }}>
          <p style={{ fontSize:13, fontWeight:600, color:"#94a3b8", marginBottom:8, paddingLeft:4 }}>Presupuestos por categoría</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
            {CATEGORIES.map(cat => {
              const s=byCat[cat.id]||0, b=budgets[cat.id]||0, over=s>b;
              return <div key={cat.id} style={{...card, padding:12, display:"flex", alignItems:"center", gap:12}}>
                <div className="catBadge" style={{ background:cat.color+"22", color:cat.color }}>{cat.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ fontSize:14, fontWeight:500 }}>{cat.label}</p>
                  <p style={{ fontSize:11, color:over?"#EF4444":"#475569" }}>{fmt(s)} de {fmt(b)}</p>
                </div>
                <button className="edBtn" onClick={()=>{setFBud({cat:cat.id, val:budgets[cat.id]||""});setModal("budget");}}>Editar</button>
              </div>;
            })}
          </div>

          <p style={{ fontSize:13, fontWeight:600, color:"#94a3b8", marginBottom:8, paddingLeft:4 }}>Datos y respaldo</p>
          <div style={{...card, padding:16, marginBottom:10}}>
            <p style={{ fontSize:13, marginBottom:10 }}>Exportar todos tus datos como archivo de respaldo (JSON).</p>
            <button className="btnG" style={{ marginTop:0 }} onClick={exportBackup}>Descargar backup</button>
          </div>
          <div style={{...card, padding:16, marginBottom:10}}>
            <p style={{ fontSize:13, marginBottom:10 }}>Restaurar datos desde un backup previo.</p>
            <label style={{ display:"block" }}>
              <input type="file" accept=".json,application/json" onChange={importBackup} style={{ display:"none" }}/>
              <span className="btnG" style={{ marginTop:0, display:"block", textAlign:"center" }}>Importar backup</span>
            </label>
          </div>
          <div style={{...card, padding:16, borderColor:"#ef444422"}}>
            <p style={{ fontSize:13, marginBottom:10, color:"#94a3b8" }}>Eliminar todos los datos guardados (no se puede deshacer).</p>
            <button className="btnDanger" onClick={()=>{
              if (confirm("¿Borrar TODOS los datos y volver a los valores iniciales?")) {
                localStorage.clear();
                location.reload();
              }
            }}>Borrar todo</button>
          </div>

          <p style={{ fontSize:11, color:"#475569", textAlign:"center", marginTop:24 }}>Mis Finanzas · Datos guardados localmente en tu dispositivo</p>
        </div>}
      </div>

      {/* ── FABs ── */}
      {tab==="cashflow" && <div className="fabs">
        <button className="fab" style={{ background:"linear-gradient(135deg,#dc2626,#ef4444)" }} onClick={()=>setModal("expense")}>−</button>
        <button className="fab" style={{ background:"linear-gradient(135deg,#059669,#10b981)" }} onClick={()=>setModal("income")}>+</button>
      </div>}

      {/* ── Nav ── */}
      <nav className="nav">
        {tabs.map(t=>(
          <button key={t.id} className="tbtn" onClick={()=>setTab(t.id)} style={{ color:tab===t.id?"#6366f1":"#475569" }}>
            <span style={{ fontSize:11, fontWeight:tab===t.id?600:500, paddingBottom:10 }}>{t.label}</span>
          </button>
        ))}
      </nav>

      {/* ════ MODALS ════ */}
      {modal==="expense" && <Modal title={editing?.type==="expense"?"Editar gasto":"Nuevo gasto"} onClose={closeModal}>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <input className="if" placeholder="Descripción (ej: Supermercado)" value={fExp.desc} onChange={e=>setFExp(p=>({...p,desc:e.target.value}))}/>
          <input className="if" placeholder="Monto ($)" type="number" inputMode="decimal" value={fExp.amount} onChange={e=>setFExp(p=>({...p,amount:e.target.value}))}/>
          <select className="if" value={fExp.category} onChange={e=>setFExp(p=>({...p,category:e.target.value}))}>
            {CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <input className="if" type="date" value={fExp.date} onChange={e=>setFExp(p=>({...p,date:e.target.value}))}/>
        </div>
        <div style={{ marginTop:20 }}>
          <button className="btn" onClick={saveExp}>{editing?"Guardar cambios":"Guardar gasto"}</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="income" && <Modal title={editing?.type==="income"?"Editar ingreso":"Nuevo ingreso"} onClose={closeModal}>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <input className="if" placeholder="Descripción (ej: Sueldo)" value={fInc.desc} onChange={e=>setFInc(p=>({...p,desc:e.target.value}))}/>
          <input className="if" placeholder="Monto ($)" type="number" inputMode="decimal" value={fInc.amount} onChange={e=>setFInc(p=>({...p,amount:e.target.value}))}/>
          <select className="if" value={fInc.category} onChange={e=>setFInc(p=>({...p,category:e.target.value}))}>
            {INCOME_CATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <input className="if" type="date" value={fInc.date} onChange={e=>setFInc(p=>({...p,date:e.target.value}))}/>
        </div>
        <div style={{ marginTop:20 }}>
          <button className="btnInc" onClick={saveInc}>{editing?"Guardar cambios":"Guardar ingreso"}</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="savings" && <Modal title={fSav.type==="deposit"?"Depositar en ahorros":"Retirar de ahorros"} onClose={closeModal}>
        <p style={{ fontSize:13, color:"#475569", marginBottom:16, marginTop:-10 }}>
          Saldo actual: <span style={{ fontWeight:600, color:"#e2e8f0" }}>{fmt(savings.balance)}</span>
        </p>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <input className="if" placeholder="Monto ($)" type="number" inputMode="decimal" value={fSav.amount} onChange={e=>setFSav(p=>({...p,amount:e.target.value}))}/>
          <input className="if" placeholder="Nota (opcional)" value={fSav.note} onChange={e=>setFSav(p=>({...p,note:e.target.value}))}/>
        </div>
        <div style={{ marginTop:20 }}>
          <button className={fSav.type==="deposit"?"btnInc":"btnDanger"} onClick={saveSav}>
            {fSav.type==="deposit"?"Depositar":"Retirar"}
          </button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="debt" && <Modal title={editing?.type==="debt"?"Editar deuda":"Nueva deuda"} onClose={closeModal}>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <input className="if" placeholder="Nombre" value={fDebt.name} onChange={e=>setFDebt(p=>({...p,name:e.target.value}))}/>
          <input className="if" placeholder="Monto total ($)" type="number" inputMode="decimal" value={fDebt.total} onChange={e=>setFDebt(p=>({...p,total:e.target.value}))}/>
          <input className="if" placeholder="Ya pagado ($)" type="number" inputMode="decimal" value={fDebt.paid} onChange={e=>setFDebt(p=>({...p,paid:e.target.value}))}/>
          <div><p style={{ fontSize:12,color:"#475569",marginBottom:6 }}>Fecha de vencimiento (opcional)</p>
          <input className="if" type="date" value={fDebt.dueDate} onChange={e=>setFDebt(p=>({...p,dueDate:e.target.value}))}/></div>
        </div>
        <div style={{ marginTop:20 }}>
          <button className="btn" onClick={saveDebt}>{editing?"Guardar cambios":"Crear deuda"}</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="payDebt" && fPay.debtId && <Modal title="Registrar pago" onClose={closeModal}>
        <p style={{ fontSize:13, color:"#475569", marginBottom:16, marginTop:-10 }}>
          Restante: <span style={{ fontWeight:600, color:"#e2e8f0" }}>{fmt((debts.find(d=>d.id===fPay.debtId)?.total||0) - (debts.find(d=>d.id===fPay.debtId)?.paid||0))}</span>
        </p>
        <input className="if" placeholder="Monto del pago ($)" type="number" inputMode="decimal" value={fPay.amount} onChange={e=>setFPay(p=>({...p,amount:e.target.value}))}/>
        <div style={{ marginTop:20 }}>
          <button className="btnInc" onClick={payDebt}>Confirmar pago</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="budget" && fBud.cat && <Modal title={`Presupuesto: ${catMap[fBud.cat]?.label}`} onClose={closeModal}>
        <p style={{ fontSize:13, color:"#475569", marginBottom:16, marginTop:-10 }}>Gastado este mes: {fmt(byCat[fBud.cat]||0)}</p>
        <input className="if" placeholder="Nuevo límite ($)" type="number" inputMode="decimal" value={fBud.val} onChange={e=>setFBud(p=>({...p,val:e.target.value}))}/>
        <div style={{ marginTop:20 }}>
          <button className="btn" onClick={saveBud}>Guardar presupuesto</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}

      {modal==="inv" && <Modal title={editing?.type==="inv"?"Editar inversión":"Nueva inversión"} onClose={closeModal}>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <input className="if" placeholder="Nombre (ej: BTC, SPY, Plazo fijo)" value={fInv.name} onChange={e=>setFInv(p=>({...p,name:e.target.value}))}/>
          <select className="if" value={fInv.type} onChange={e=>setFInv(p=>({...p,type:e.target.value}))}>
            {INV_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <div><p style={{ fontSize:12,color:"#475569",marginBottom:6 }}>Valor actual en USD</p>
          <input className="if" placeholder="0" type="number" inputMode="decimal" value={fInv.valueUSD} onChange={e=>setFInv(p=>({...p,valueUSD:e.target.value}))}/></div>
          <input className="if" placeholder="Notas opcionales" value={fInv.notes} onChange={e=>setFInv(p=>({...p,notes:e.target.value}))}/>
        </div>
        <div style={{ marginTop:20 }}>
          <button className="btn" onClick={saveInv}>{editing?"Guardar cambios":"Agregar inversión"}</button>
          <button className="btnG" onClick={closeModal}>Cancelar</button>
        </div>
      </Modal>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
